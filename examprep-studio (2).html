/* ════════════════════════════════════════════════════════════════════════
   STORAGE HELPERS
   ════════════════════════════════════════════════════════════════════════ */
const DB_KEY    = 'examprep_history';
const DRAFT_KEY = 'examprep_draft';

function getHistory()   { try { return JSON.parse(localStorage.getItem(DB_KEY)    || '[]')  } catch { return [] } }
function saveHistory(h) { localStorage.setItem(DB_KEY, JSON.stringify(h)); }
function getDraft()     { try { return JSON.parse(localStorage.getItem(DRAFT_KEY) || 'null') } catch { return null } }
function saveDraft(d)   { localStorage.setItem(DRAFT_KEY, JSON.stringify(d)); }
function clearDraft()   { localStorage.removeItem(DRAFT_KEY); }

/* ════════════════════════════════════════════════════════════════════════
   UTILITIES
   ════════════════════════════════════════════════════════════════════════ */

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDuration(s) {
  const m = Math.floor(s / 60), sec = s % 60;
  return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
}

function toast(msg, type = 'info', dur = 3000) {
  const colors = {
    success: 'bg-emerald-500 text-white',
    error:   'bg-red-500 text-white',
    info:    'bg-accent text-white',
  };
  const el = document.createElement('div');
  el.className = `toast-anim fixed bottom-6 right-6 px-5 py-3 rounded-xl font-medium text-sm shadow-lg z-[1000] ${colors[type]||colors.info}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'all .3s ease';
    el.style.transform = 'translateX(120%)';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, dur);
}

/* ════════════════════════════════════════════════════════════════════════
   PDF TEXT EXTRACTION
   Groups PDF.js text items into visual lines using adaptive Y-bucketing,
   since fixed-tolerance bucketing collapses tightly-spaced bullet lists.
   ════════════════════════════════════════════════════════════════════════ */
async function extractLines(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  const allLines = [];

  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const tc   = await page.getTextContent();
    if (!tc.items.length) continue;

    // Estimate typical line-height on this page from the spread of Y values.
    const ys = [...new Set(tc.items.map(i => Math.round(i.transform[5])))].sort((a,b)=>b-a);
    let bucket = 4;
    if (ys.length > 1) {
      const gaps = [];
      for (let k = 0; k < ys.length - 1; k++) gaps.push(Math.abs(ys[k] - ys[k+1]));
      gaps.sort((a,b)=>a-b);
      const medGap = gaps[Math.floor(gaps.length / 2)] || 4;
      bucket = Math.max(2, Math.floor(medGap * 0.45));
    }

    // Group items into lines using the adaptive bucket tolerance.
    const byY = new Map();
    for (const item of tc.items) {
      const rawY = Math.round(item.transform[5]);
      let key = null;
      for (const k of byY.keys()) {
        if (Math.abs(k - rawY) <= bucket) { key = k; break; }
      }
      if (key === null) key = rawY;
      if (!byY.has(key)) byY.set(key, []);
      byY.get(key).push(item);
    }

    const sorted = [...byY.entries()].sort((a, b) => b[0] - a[0]); // top → bottom
    for (const [, items] of sorted) {
      items.sort((a, b) => a.transform[4] - b.transform[4]); // left → right
      const lineStr = items.map(i => i.str).join('').trim();
      if (lineStr) allLines.push(lineStr);
    }
  }

  return allLines;
}

/* ════════════════════════════════════════════════════════════════════════
   BULLET-FIRST STATE MACHINE PARSER

   Core principle: question boundaries are NOT determined by numbers in the
   text (those numbers can appear anywhere, e.g. internal sub-lists like
   "1. Latınca... 2. Yazılı..." inside a question's own description).

   Boundaries are determined ONLY by blocks of option lines (• or √).
   Algorithm:
     1. Walk every line. Classify each as OPTION or TEXT.
        - OPTION: starts with • (bullet) or √ (checkmark/correct marker)
        - TEXT:   everything else — numbers, prose, sub-lists, headers
     2. Accumulate TEXT lines into a running buffer.
     3. When an OPTION line appears, you've reached the end of the current
        question's text and the start of its option block. Keep consuming
        OPTION lines into that same block (no fixed count — 3, 4, 5+ all
        work) until a TEXT line interrupts the block.
     4. The interrupting TEXT line means: the option block just collected
        belongs to a finished question (Question Text Buffer + Options
        Block) → emit it as a question, then start a NEW text buffer with
        this interrupting line as its first line.
     5. At end of file, flush whatever option block + text buffer remain.
     6. Validation: a finished question is only kept if it has >= 2 options.
        Otherwise both the leftover text and incomplete option block are
        merged into the next question's text buffer (so no content is lost,
        but no fake question is created either).
   ════════════════════════════════════════════════════════════════════════ */

const RX_CORRECT = /^[\u221a\u2713\u2714\u2705]/;                                  // √ ✓ ✔ ✅
const RX_BULLET  = /^[\u2022\u00b7\u25cf\u25e6\u2023\u2043\u2219\u204c\u204d\-\*]/; // • · ◆ ◦ ‣ ⁃ ∙ - *

function isOptionLine(line) {
  return RX_CORRECT.test(line) || RX_BULLET.test(line);
}

function stripOptionMarker(line) {
  const isCorrect = RX_CORRECT.test(line);
  const text = line
    .replace(/^[\u221a\u2713\u2714\u2705]\s*/, '')
    .replace(/^[\u2022\u00b7\u25cf\u25e6\u2023\u2043\u2219\u204c\u204d\-\*]\s*/, '')
    .trim();
  return { text, isCorrect };
}

// A line that is ONLY a marker (√, •, etc.) with no option text attached.
// PDF.js sometimes extracts the checkmark/bullet glyph as its own text run
// on its own visual line, especially when it sits slightly off-baseline
// from the option text next to it. Left unhandled, the marker becomes a
// 1-character "option" that gets dropped, and the option text that follows
// it gets misread as plain question text — corrupting the whole question.
const RX_MARKER_ONLY = /^[\u221a\u2713\u2714\u2705\u2022\u00b7\u25cf\u25e6\u2023\u2043\u2219\u204c\u204d\-\*]\s*$/;

// Pre-process raw extracted lines: fuse any orphaned marker-only line with
// the very next line, so "√" followed by "akt" becomes "√ akt" before the
// main state machine ever sees it.
function mergeOrphanedMarkers(lines) {
  const merged = [];
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    if (RX_MARKER_ONLY.test(line) && i + 1 < lines.length) {
      const next = lines[i + 1].trim();
      // Only fuse if the next line is NOT itself another marker/question
      // line (avoids merging two stray symbols together) and has content.
      if (next && !RX_MARKER_ONLY.test(next)) {
        merged.push(line + ' ' + next);
        i++; // consume the next line too
        continue;
      }
    }
    merged.push(line);
  }
  return merged;
}

function parseQuestions(rawLines) {
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const questions = [];
  const discardedItems = [];

  // Repair orphaned marker lines before running the state machine.
  const lines = mergeOrphanedMarkers(rawLines);

  let textBuffer = [];     // lines accumulating toward the NEXT question's text
  let optionBlock = [];    // option lines belonging to the CURRENT block, if any
  let qCounter = 0;        // sequential numbering for emitted questions (display id)

  // Emit a finished question from (textBuffer, optionBlock).
  // Returns true if a valid question was created, false if discarded.
  function emitQuestion() {
    const questionText = textBuffer.join(' ').trim();
    const hasEnoughOptions = optionBlock.length >= 2;
    const hasText = questionText.length > 3;

    if (hasText && hasEnoughOptions) {
      const options = [];
      let answerLetter = '';
      optionBlock.forEach((raw, idx) => {
        const { text, isCorrect } = stripOptionMarker(raw);
        if (!text) return;
        const letter = LETTERS[options.length] || String(options.length + 1);
        options.push({ letter, text });
        if (isCorrect && !answerLetter) answerLetter = letter;
      });

      let noCheckmark = false;
      if (!answerLetter && options.length > 0) {
        answerLetter = options[0].letter;
        noCheckmark = true;
      }

      qCounter++;
      questions.push({
        id: qCounter,
        question: questionText,
        options,
        answer: answerLetter,
        type: 'mcq',
        noCheckmark,
      });
      return true;
    } else {
      // Not enough options (or empty text) — log it, don't lose the text.
      if (questionText.length > 0 || optionBlock.length > 0) {
        discardedItems.push({
          id: discardedItems.length + 1,
          question: questionText.slice(0, 200),
          optionCount: optionBlock.length,
          options: optionBlock.map(o => stripOptionMarker(o).text),
        });
      }
      return false;
    }
  }

  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;

    if (isOptionLine(line)) {
      // Currently inside / starting an option block.
      optionBlock.push(line);
    } else {
      // TEXT line.
      if (optionBlock.length > 0) {
        // We were collecting an option block and now hit text again —
        // that means the option block just ended. Emit the question that
        // was built from (textBuffer so far) + (optionBlock).
        const emitted = emitQuestion();
        // Reset for the next question. If discarded, keep accumulating
        // text from where we left off (don't lose content); otherwise
        // start fresh with this new text line.
        if (emitted) {
          textBuffer = [line];
        } else {
          // merge old text buffer's leftover with new line to avoid loss
          textBuffer = [line];
        }
        optionBlock = [];
      } else {
        // Still accumulating question text (numbers inside here, like
        // "1. Latınca...", are NOT treated as new question boundaries).
        textBuffer.push(line);
      }
    }
  }

  // Flush whatever remains at end of file.
  if (optionBlock.length > 0) {
    emitQuestion();
  }

  questions.discardedCount = discardedItems.length;
  questions.discardedItems = discardedItems;

  // Debug logging — never allowed to break parsing.
  if (discardedItems.length > 0) {
    try {
      console.log(`%c[ExamPrep Parser] ${discardedItems.length} block(s) discarded (< 2 options):`, 'color:#fbbf24;font-weight:bold');
      const tableData = discardedItems.map(d => ({
        '#': d.id,
        'Options found': d.optionCount,
        'Text': d.question.slice(0, 100) + (d.question.length > 100 ? '…' : ''),
      }));
      if (typeof console.table === 'function') {
        console.table(tableData);
      } else {
        tableData.forEach(row => console.log(`#${row['#']} — ${row['Options found']} option(s) — "${row['Text']}"`));
      }
    } catch (e) {
      try { console.log('[ExamPrep Parser] discarded items (fallback):', discardedItems); } catch (_) {}
    }
  }

  return questions;
}

async function parsePDF(file) {
  const lines = await extractLines(file);
  return parseQuestions(lines);
}

/* ════════════════════════════════════════════════════════════════════════
   APP STATE
   ════════════════════════════════════════════════════════════════════════ */
let state = {
  view: 'upload',
  theme: localStorage.getItem('examprep_theme') || 'dark',
  questions: [],
  fileName: '',
  quizQuestions: [],
  currentIdx: 0,
  userAnswers: {},
  quizRange: { from: 1, to: 50 },
  startTime: null,
  historyList: getHistory(),
  reviewData: null,
  loading: false,
  loadingText: '',
  parseError: null,
  discardedCount: 0,
  discardedItems: [],
  showSkippedLog: false,
};

const draft = getDraft();
if (draft && draft.quizQuestions && draft.quizQuestions.length > 0) {
  state = { ...state, ...draft, view: 'quiz' };
}

/* ════════════════════════════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════════════════════════════ */
function render() {
  document.documentElement.classList.toggle('dark', state.theme === 'dark');
  const app = document.getElementById('app');
  const hasQuestions = state.questions.length > 0;

  app.innerHTML = `
    <nav class="sticky top-0 z-50 flex items-center justify-between px-5 sm:px-7 py-3.5 bg-white dark:bg-[#1a1d27] border-b border-slate-200 dark:border-slate-700/60">
      <div class="text-lg font-bold tracking-tight text-accent">Exam<span class="text-slate-800 dark:text-slate-100">Prep</span></div>
      <div class="flex gap-1">
        ${hasQuestions ? `
          <button onclick="setView('upload')" class="${navTabClass('upload')}">📄 Library</button>
          <button onclick="setView('setup')"  class="${navTabClass('setup')}">⚙️ Setup</button>
        ` : `<button class="${navTabClass('upload')}">📄 Upload</button>`}
        <button onclick="setView('history')" class="${navTabClass('history')}">🕑 History</button>
      </div>
      <button onclick="toggleTheme()" class="w-9 h-9 rounded-lg bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 flex items-center justify-center text-base transition-colors">
        ${state.theme === 'dark' ? '☀️' : '🌙'}
      </button>
    </nav>
    <main class="flex-1 px-4 sm:px-6 py-8 max-w-3xl mx-auto w-full">
      ${state.loading      ? renderLoading()  :
        state.view==='upload'  ? renderUpload()   :
        state.view==='setup'   ? renderSetup()    :
        state.view==='quiz'    ? renderQuiz()     :
        state.view==='results' ? renderResults()  :
        state.view==='history' ? renderHistory()  :
        state.view==='review'  ? renderReview()   : ''}
    </main>
  `;
  attachEventListeners();
}

function navTabClass(view) {
  const active = state.view === view;
  return `px-4 py-1.5 rounded-lg text-[13px] font-medium transition-colors ${
    active
      ? 'bg-accent/10 text-accent'
      : 'text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800'
  }`;
}

function card(inner, extra='') {
  return `<div class="bg-white dark:bg-[#1a1d27] border border-slate-200 dark:border-slate-700/60 rounded-2xl p-6 sm:p-7 ${extra}">${inner}</div>`;
}

/* ───────────────────────── LOADING ───────────────────────── */
function renderLoading() {
  return `
    <div class="flex flex-col items-center justify-center gap-4 py-16">
      <div class="spinner w-9 h-9"></div>
      <div class="text-sm text-slate-500 dark:text-slate-400">${state.loadingText || 'Processing...'}</div>
    </div>`;
}

/* ───────────────────────── UPLOAD ───────────────────────── */
function renderUpload() {
  const mcqCount = state.questions.filter(q=>q.type==='mcq').length;
  const noCheckCount = state.questions.filter(q=>q.noCheckmark).length;

  const uploadCard = card(`
    <h2 class="text-lg font-bold mb-1.5">Upload your exam PDF</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">
      Questions are detected by scanning for blocks of • / √ options. Numbers inside your text (like internal lists) are safely ignored as boundaries.
    </p>
    <div id="drop-zone" class="relative border-2 border-dashed border-slate-300 dark:border-slate-600 rounded-2xl py-14 px-7 text-center cursor-pointer hover:border-accent hover:bg-accent/5 transition-colors">
      <input type="file" accept=".pdf" id="pdf-input" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
      <div class="text-5xl mb-4 opacity-50">📄</div>
      <div class="text-base font-semibold mb-1.5">Drop your PDF here</div>
      <div class="text-sm text-slate-500 dark:text-slate-400">or click to browse — PDF files only</div>
    </div>
    ${state.parseError ? `<div class="mt-3 px-4 py-3 bg-amber-50 dark:bg-amber-500/10 border border-amber-400 rounded-xl text-sm text-amber-700 dark:text-amber-400">⚠️ ${state.parseError}</div>` : ''}
  `);

  const resultsCard = state.questions.length > 0 ? card(`
    <div class="flex items-start justify-between gap-4 mb-4">
      <div>
        <h2 class="text-lg font-bold mb-1">${escapeHtml(state.fileName)}</h2>
        <div class="text-[13px] text-slate-500 dark:text-slate-400">
          ${state.questions.length} questions parsed · ${mcqCount} multiple-choice ·
          ${noCheckCount > 0
            ? `<span class="text-amber-500 font-medium">⚠️ ${noCheckCount} without √ marker</span>`
            : `<span class="text-emerald-500 font-medium">✓ all answers detected</span>`}
          ${state.discardedCount > 0 ? ` · <span class="underline cursor-pointer" onclick="toggleSkippedLog()">${state.discardedCount} skipped (view log)</span>` : ''}
        </div>
      </div>
      <button onclick="setView('setup')" class="shrink-0 px-5 py-2.5 rounded-xl bg-accent hover:bg-accent-dark text-white text-sm font-semibold transition-colors">Start Quiz →</button>
    </div>
    <div class="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden mb-4">
      <div class="h-full bg-emerald-400 rounded-full" style="width:100%"></div>
    </div>
    <div class="preview-box max-h-56 overflow-y-auto border border-slate-200 dark:border-slate-700/60 rounded-xl p-4 bg-slate-50 dark:bg-slate-800/40 text-slate-600 dark:text-slate-300">${
      state.questions.slice(0, 6).map(q => {
        const warn = q.noCheckmark ? ' ⚠️ no √ found — first option used as fallback' : '';
        const optLines = q.options.map(o => `  ${o.letter === q.answer ? '√' : '•'} [${o.letter}] ${o.text}`).join('\n');
        return `Q${q.id}: ${q.question}\n${optLines}\n→ Correct: ${q.answer}  (${q.options.length} options)${warn}`;
      }).join('\n\n')
    }${state.questions.length > 6 ? `\n\n… and ${state.questions.length - 6} more questions` : ''}</div>
  `) : '';

  const skippedCard = state.discardedItems.length > 0 ? card(`
    <div class="flex items-center justify-between gap-4 cursor-pointer" onclick="toggleSkippedLog()">
      <div>
        <h2 class="text-base font-bold mb-1">⚠️ Skipped Items Log (${state.discardedItems.length})</h2>
        <div class="text-[13px] text-slate-500 dark:text-slate-400">Text blocks that ended up with fewer than 2 options. Check console for full table too.</div>
      </div>
      <button class="shrink-0 px-3.5 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-xs font-semibold">${state.showSkippedLog ? 'Hide ▲' : 'Show ▼'}</button>
    </div>
    ${state.showSkippedLog ? `
      <div class="h-px bg-slate-200 dark:bg-slate-700/60 my-4"></div>
      <div class="preview-box max-h-80 overflow-y-auto border border-slate-200 dark:border-slate-700/60 rounded-xl p-4 bg-slate-50 dark:bg-slate-800/40 text-slate-600 dark:text-slate-300">${
        state.discardedItems.map(d =>
          `#${d.id} — ${d.optionCount} option(s) found\n"${d.question.slice(0,160)}${d.question.length>160?'…':''}"` +
          (d.options.length > 0 ? '\n  ' + d.options.map(o=>`• ${o}`).join('\n  ') : '')
        ).join('\n\n')
      }</div>
      <div class="text-[12.5px] text-slate-500 dark:text-slate-400 mt-3">
        Tip: if a skipped block is a real question missing its √, the checkmark glyph may not have been extractable as text on that line (e.g. it was rendered as an image).
      </div>
    ` : ''}
  `) : '';

  const formatCard = card(`
    <h3 class="text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-3">How parsing works</h3>
    <div class="preview-box border border-slate-200 dark:border-slate-700/60 rounded-xl p-4 bg-slate-50 dark:bg-slate-800/40 text-slate-600 dark:text-slate-300">— Text accumulates as the question description until a block of options starts.
— Options begin with • (wrong) or √ (correct). Any number of options works (3, 4, 5+).
— Numbers inside the text (e.g. "1. Latınca... 2. Yazılı...") stay part of the question — they do NOT start new questions.
— A new question starts only when, after collecting options, normal text appears again.
— Blocks with fewer than 2 options are discarded and logged, not shown as fake questions.

Example:
Cinayət hüququnda termin nəyi bildirir?
1. Latınca "delictum" sözündən yaranıb
2. Hüquqazidd əməli bildirir
   • Mülki hüquq pozuntusu
   √ Cinayət əməlini bildirən termin
   • İnzibati xəta
   • Mülki müqavilə pozuntusu</div>
  `, 'mt-5');

  return uploadCard + resultsCard + skippedCard + formatCard;
}

/* ───────────────────────── SETUP ───────────────────────── */
function renderSetup() {
  const total = state.questions.length;
  const from  = state.quizRange.from;
  const to    = state.quizRange.to;
  const count = Math.max(0, to - from + 1);
  const valid = count >= 50 && from >= 1 && to <= total && from < to;
  const hasDraft = !!(getDraft() && getDraft().quizQuestions);

  const setupCard = card(`
    <h2 class="text-lg font-bold mb-1">Configure your quiz</h2>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">${total} questions available from <strong>${escapeHtml(state.fileName)}</strong></p>
    <h3 class="text-[13px] font-semibold text-slate-500 dark:text-slate-400 mb-3">Question range</h3>
    <div class="grid grid-cols-2 gap-4 mb-5">
      <div>
        <div class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5">From question</div>
        <input type="number" id="range-from" value="${from}" min="1" max="${total}" oninput="updateRange()"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent">
      </div>
      <div>
        <div class="text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5">To question</div>
        <input type="number" id="range-to" value="${to}" min="1" max="${total}" oninput="updateRange()"
          class="w-full px-3.5 py-2.5 rounded-xl border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-accent/50 focus:border-accent">
      </div>
    </div>
    <div id="range-status">${rangeStatusHtml(count)}</div>
    <div class="h-px bg-slate-200 dark:bg-slate-700/60 my-6"></div>
    <div class="flex items-center justify-between gap-4">
      <div class="text-[13px] text-slate-500 dark:text-slate-400">Questions are shuffled (Fisher–Yates) within your selected range.</div>
      <button id="start-quiz-btn" ${valid?'':'disabled'} onclick="startQuiz()"
        class="shrink-0 px-5 py-2.5 rounded-xl bg-accent hover:bg-accent-dark text-white text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
        Start Exam →
      </button>
    </div>
  `);

  const draftCard = hasDraft ? card(`
    <div class="flex items-center justify-between gap-4">
      <div>
        <h3 class="text-sm font-semibold mb-0.5">Resume saved quiz</h3>
        <div class="text-[13px] text-slate-500 dark:text-slate-400">You have an in-progress exam saved.</div>
      </div>
      <div class="flex gap-2 shrink-0">
        <button onclick="resumeDraft()" class="px-3.5 py-2 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-xs font-semibold">Resume</button>
        <button onclick="discardDraft()" class="px-3.5 py-2 rounded-lg bg-red-50 dark:bg-red-500/10 border border-red-400 text-red-500 text-xs font-semibold">Discard</button>
      </div>
    </div>
  `, 'mt-5') : '';

  return setupCard + draftCard;
}

function rangeStatusHtml(count) {
  if (count < 50 && count > 0) {
    return `<div class="px-4 py-3 bg-amber-50 dark:bg-amber-500/10 border border-amber-400 rounded-xl text-sm text-amber-700 dark:text-amber-400">⚠️ Minimum range is 50 questions. Current: ${count} questions.</div>`;
  } else if (count >= 50) {
    return `<div class="px-4 py-3 bg-accent/5 border border-accent rounded-xl text-sm text-accent">✓ ${count} questions selected — will be randomized.</div>`;
  }
  return '';
}

/* ───────────────────────── QUIZ ───────────────────────── */
function renderQuiz() {
  const q = state.quizQuestions[state.currentIdx];
  if (!q) return card('<div class="text-center text-slate-400 py-16">No question found.</div>');

  const total    = state.quizQuestions.length;
  const answered = Object.keys(state.userAnswers).length;
  const pct      = Math.round(((state.currentIdx + 1) / total) * 100);
  const userAns  = state.userAnswers[state.currentIdx] || '';

  return card(`
    <div class="flex items-center justify-between mb-5">
      <div class="inline-flex items-center text-xs font-semibold px-2.5 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">
        Question ${state.currentIdx + 1} of ${total}
      </div>
      <div class="text-xs text-slate-400 dark:text-slate-500">${answered} answered · ${total - answered} remaining</div>
    </div>
    <div class="h-1.5 bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden mb-6">
      <div class="h-full bg-accent rounded-full transition-all duration-300" style="width:${pct}%"></div>
    </div>
    <div class="text-base font-medium leading-relaxed mb-7 whitespace-pre-wrap">${escapeHtml(q.question)}</div>
    <div class="flex flex-col gap-2.5">
      ${q.options.map(opt => `
        <div onclick="selectAnswer('${opt.letter}')"
          class="flex items-start gap-3 px-4 py-3.5 rounded-xl border-[1.5px] cursor-pointer transition-colors ${
            userAns === opt.letter
              ? 'border-accent bg-accent/10'
              : 'border-slate-200 dark:border-slate-700 hover:border-slate-300 dark:hover:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-800/50'
          }">
          <div class="w-7 h-7 min-w-7 rounded-md flex items-center justify-center text-xs font-bold transition-colors ${
            userAns === opt.letter ? 'bg-accent text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400'
          }">${opt.letter}</div>
          <div class="text-sm leading-relaxed pt-0.5">${escapeHtml(opt.text)}</div>
        </div>
      `).join('')}
    </div>
    <div class="flex items-center justify-between gap-3 mt-8">
      <button ${state.currentIdx===0?'disabled':''} onclick="navigate(-1)"
        class="px-5 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed">
        ← Previous
      </button>
      <button onclick="confirmFinish()" class="px-5 py-2.5 rounded-xl bg-red-50 dark:bg-red-500/10 border border-red-400 text-red-500 text-sm font-semibold">
        Finish Exam
      </button>
      <button onclick="navigate(1)" class="px-5 py-2.5 rounded-xl bg-accent hover:bg-accent-dark text-white text-sm font-semibold">
        ${state.currentIdx === total - 1 ? 'Finish →' : 'Next →'}
      </button>
    </div>
  `);
}

/* ───────────────────────── RESULTS ───────────────────────── */
function renderResults() {
  const r       = state.reviewData || buildReviewData();
  const total   = r.items.length;
  const correct = r.items.filter(i => i.isCorrect).length;
  const wrong   = total - correct;
  const pct     = Math.round((correct / total) * 100);
  const timeStr = r.duration ? formatDuration(r.duration) : '—';

  // CRUCIAL SORTING RULE: wrong answers first, correct answers after.
  const sortedItems = [...r.items].sort((a, b) => {
    if (a.isCorrect === b.isCorrect) return 0;
    return a.isCorrect ? 1 : -1; // incorrect (false) sorts before correct (true)
  });

  const ringColor = pct>=70?'border-emerald-400':pct>=50?'border-amber-400':'border-red-400';

  const summaryCard = card(`
    <div class="text-center">
      <h2 class="text-lg font-bold mb-5">Exam complete</h2>
      <div class="w-28 h-28 rounded-full border-4 ${ringColor} flex flex-col items-center justify-center mx-auto mb-7">
        <div class="text-2xl font-bold">${pct}%</div>
        <div class="text-[11px] text-slate-400">Score</div>
      </div>
      <div class="grid grid-cols-3 gap-3.5 mb-7">
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4">
          <div class="text-xl font-bold text-emerald-500">${correct}</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">Correct</div>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4">
          <div class="text-xl font-bold text-red-500">${wrong}</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">Wrong</div>
        </div>
        <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4">
          <div class="text-xl font-bold">${timeStr}</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">Time</div>
        </div>
      </div>
      <div class="flex justify-center gap-3">
        <button onclick="setView('setup')" class="px-5 py-2.5 rounded-xl bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-sm font-semibold">New Quiz</button>
        <button onclick="setView('history')" class="px-5 py-2.5 rounded-xl bg-accent hover:bg-accent-dark text-white text-sm font-semibold">View History</button>
      </div>
    </div>
  `);

  const wrongCount = sortedItems.filter(i=>!i.isCorrect).length;

  const itemsHtml = sortedItems.map((item, idx) => {
    // Insert a section divider right where we transition from wrong → correct
    const isFirstCorrect = item.isCorrect && idx === wrongCount;
    const header = idx === 0 && wrongCount > 0
      ? `<h3 class="text-red-500 text-sm font-bold mb-3.5 mt-7">❌ Incorrect answers (${wrongCount}) — review these first</h3>`
      : (idx === 0 && wrongCount === 0
        ? `<h3 class="text-emerald-500 text-sm font-bold mb-3.5 mt-7">✅ All correct!</h3>`
        : '');
    const correctHeader = isFirstCorrect
      ? `<h3 class="text-emerald-500 text-sm font-bold mb-3.5 mt-7">✅ Correct answers (${total - wrongCount})</h3>`
      : '';
    return header + correctHeader + renderResultItem(item);
  }).join('');

  return summaryCard + itemsHtml;
}

function renderResultItem(item) {
  const ua = item.userAnswer || '(not answered)';
  const ca = item.correctAnswer;
  const border = item.isCorrect ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-500/10' : 'border-red-400 bg-red-50 dark:bg-red-500/10';
  const badge = item.isCorrect
    ? '<span class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-md bg-emerald-400 text-black mb-2.5">✓ Correct</span>'
    : '<span class="inline-flex items-center text-xs font-bold px-2.5 py-1 rounded-md bg-red-500 text-white mb-2.5">✗ Wrong</span>';
  return `
    <div class="border-[1.5px] ${border} rounded-xl p-4.5 mb-3 p-4">
      ${badge}
      <div class="text-sm font-medium mb-2.5 whitespace-pre-wrap">Q${item.originalId}: ${escapeHtml(item.question)}</div>
      <div class="text-[13px] px-2.5 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 mt-1.5">
        <span class="font-semibold mr-1">Your answer:</span>${escapeHtml(ua)}
      </div>
      ${!item.isCorrect ? `
      <div class="text-[13px] px-2.5 py-1.5 rounded-lg bg-emerald-100 dark:bg-emerald-500/15 text-emerald-700 dark:text-emerald-400 mt-1.5">
        <span class="font-semibold mr-1">Correct answer:</span>${escapeHtml(ca)}
      </div>` : ''}
    </div>
  `;
}

/* ───────────────────────── HISTORY ───────────────────────── */
function renderHistory() {
  const h = state.historyList;
  if (h.length === 0) return card(`
    <h2 class="text-lg font-bold mb-4">History</h2>
    <div class="text-center py-16 text-slate-400">
      <div class="text-5xl mb-4">📭</div>
      <div>No completed exams yet.</div>
      <div class="text-sm mt-1.5">Finish a quiz to see results here.</div>
    </div>
  `);

  const items = h.slice().reverse().map((item, i) => {
    const idx = h.length - 1 - i;
    const color = item.pct>=70?'text-emerald-500':item.pct>=50?'text-amber-500':'text-red-500';
    return `
      <div onclick="reviewHistory(${idx})" class="flex items-center justify-between gap-4 px-5 py-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl mb-2.5 cursor-pointer border-[1.5px] border-transparent hover:border-accent hover:bg-accent/5 transition-colors">
        <div>
          <div class="text-sm font-semibold mb-0.5">Questions ${item.range.from}–${item.range.to}</div>
          <div class="text-xs text-slate-400">${new Date(item.date).toLocaleString()} · ${item.items.length} questions</div>
        </div>
        <div class="text-right">
          <div class="text-lg font-bold ${color}">${item.pct}%</div>
          <div class="text-xs text-slate-500 dark:text-slate-400">${item.correct}/${item.items.length}</div>
        </div>
      </div>
    `;
  }).join('');

  return card(`
    <div class="flex items-center justify-between mb-5">
      <h2 class="text-lg font-bold">History</h2>
      <button onclick="clearHistory()" class="px-3.5 py-1.5 rounded-lg bg-red-50 dark:bg-red-500/10 border border-red-400 text-red-500 text-xs font-semibold">Clear all</button>
    </div>
    ${items}
  `);
}

/* ───────────────────────── REVIEW ───────────────────────── */
function renderReview() {
  const r = state.reviewData;
  if (!r) return '';
  const total   = r.items.length;
  const correct = r.items.filter(i => i.isCorrect).length;
  const pct     = Math.round((correct / total) * 100);

  const sortedItems = [...r.items].sort((a, b) => {
    if (a.isCorrect === b.isCorrect) return 0;
    return a.isCorrect ? 1 : -1;
  });
  const wrongCount = sortedItems.filter(i=>!i.isCorrect).length;

  const headerCard = card(`
    <div class="flex items-center justify-between gap-4 mb-5">
      <div>
        <h2 class="text-lg font-bold">Review: ${new Date(r.date).toLocaleDateString()}</h2>
        <div class="text-[13px] text-slate-500 dark:text-slate-400">Range: Q${r.range.from}–${r.range.to} · Score: ${correct}/${total} (${pct}%)</div>
      </div>
      <button onclick="setView('history')" class="shrink-0 px-3.5 py-2 rounded-lg bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-xs font-semibold">← Back</button>
    </div>
    <div class="grid grid-cols-3 gap-3.5">
      <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 text-center">
        <div class="text-xl font-bold text-emerald-500">${correct}</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">Correct</div>
      </div>
      <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 text-center">
        <div class="text-xl font-bold text-red-500">${total-correct}</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">Wrong</div>
      </div>
      <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-4 text-center">
        <div class="text-xl font-bold ${pct>=70?'text-emerald-500':pct>=50?'text-amber-500':'text-red-500'}">${pct}%</div>
        <div class="text-xs text-slate-500 dark:text-slate-400">Score</div>
      </div>
    </div>
  `);

  const itemsHtml = sortedItems.map((item, idx) => {
    const isFirstCorrect = item.isCorrect && idx === wrongCount;
    const header = idx === 0 && wrongCount > 0
      ? `<h3 class="text-red-500 text-sm font-bold mb-3.5 mt-7">❌ Incorrect (${wrongCount})</h3>`
      : (idx === 0 && wrongCount === 0 ? `<h3 class="text-emerald-500 text-sm font-bold mb-3.5 mt-7">✅ All correct!</h3>` : '');
    const correctHeader = isFirstCorrect ? `<h3 class="text-emerald-500 text-sm font-bold mb-3.5 mt-7">✅ Correct (${total - wrongCount})</h3>` : '';
    return header + correctHeader + renderResultItem(item);
  }).join('');

  return headerCard + itemsHtml;
}

/* ════════════════════════════════════════════════════════════════════════
   ACTIONS
   ════════════════════════════════════════════════════════════════════════ */
function setView(v) { state.view = v; render(); }

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('examprep_theme', state.theme);
  render();
}

function toggleSkippedLog() {
  state.showSkippedLog = !state.showSkippedLog;
  render();
}

function attachEventListeners() {
  const fi = document.getElementById('pdf-input');
  if (fi) fi.addEventListener('change', e => handleFile(e.target.files[0]));

  const dz = document.getElementById('drop-zone');
  if (dz) {
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('border-accent','bg-accent/5'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('border-accent','bg-accent/5'));
    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('border-accent','bg-accent/5');
      if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
    });
  }
}

async function handleFile(file) {
  if (!file || file.type !== 'application/pdf') {
    toast('Please upload a PDF file.', 'error'); return;
  }
  if (!window.pdfjsLib) {
    toast('PDF library not loaded yet. Please wait.', 'error'); return;
  }
  state.loading = true;
  state.loadingText = 'Parsing PDF…';
  state.parseError = null;
  render();

  try {
    const qs = await parsePDF(file);
    if (qs.length === 0) {
      state.parseError = 'No valid questions detected. Make sure each question is followed by at least 2 options starting with • or √.';
      state.loading = false; render(); return;
    }
    state.questions       = qs;
    state.fileName        = file.name;
    state.quizRange        = { from: 1, to: Math.min(50, qs.length) };
    state.discardedCount   = qs.discardedCount || 0;
    state.discardedItems   = qs.discardedItems || [];
    state.showSkippedLog   = false;
    state.loading           = false;
    toast(
      state.discardedCount > 0
        ? `Parsed ${qs.length} questions (skipped ${state.discardedCount} non-question blocks)`
        : `Parsed ${qs.length} questions!`,
      'success'
    );
    render();
  } catch (e) {
    state.parseError = 'Failed to parse PDF: ' + e.message;
    state.loading = false;
    render();
  }
}

function updateRange() {
  const f = parseInt(document.getElementById('range-from')?.value || 1);
  const t = parseInt(document.getElementById('range-to')?.value   || 50);
  state.quizRange = { from: f, to: t };
  const cnt = t - f + 1;
  const s = document.getElementById('range-status');
  if (s) s.innerHTML = rangeStatusHtml(cnt);
  const btn = document.getElementById('start-quiz-btn');
  if (btn) {
    const valid = cnt >= 50 && f >= 1 && t <= state.questions.length && f < t;
    btn.disabled = !valid;
  }
}

function startQuiz() {
  const { from, to } = state.quizRange;
  // Use display id (sequential 1..N assigned by the parser) for range filtering.
  const slice = state.questions.filter(q => q.id >= from && q.id <= to);
  if (slice.length < 50) {
    toast('Not enough questions in range. Minimum 50 required.', 'error'); return;
  }
  state.quizQuestions = shuffle(slice);
  state.currentIdx = 0;
  state.userAnswers = {};
  state.startTime = Date.now();
  clearDraft();
  state.view = 'quiz';
  render();
}

function navigate(dir) {
  const next = state.currentIdx + dir;
  if (next < 0) return;
  if (next >= state.quizQuestions.length) {
    confirmFinish();
    return;
  }
  state.currentIdx = next;
  persistDraft();
  render();
}

function selectAnswer(letter) {
  state.userAnswers[state.currentIdx] = letter;
  persistDraft();
  render();
}

function persistDraft() {
  saveDraft({
    quizQuestions: state.quizQuestions,
    currentIdx:    state.currentIdx,
    userAnswers:   state.userAnswers,
    quizRange:     state.quizRange,
    startTime:     state.startTime,
    fileName:      state.fileName,
    questions:     state.questions,
  });
}

function confirmFinish() {
  const answered = Object.keys(state.userAnswers).length;
  const total = state.quizQuestions.length;
  if (answered < total) {
    if (!confirm(`You have ${total - answered} unanswered question(s). Finish anyway?`)) return;
  }
  finishExam();
}

function finishExam() {
  const review = buildReviewData();
  const pct = Math.round((review.items.filter(i => i.isCorrect).length / review.items.length) * 100);
  const entry = {
    date: Date.now(),
    range: state.quizRange,
    items: review.items,
    correct: review.items.filter(i => i.isCorrect).length,
    pct,
    duration: review.duration,
  };
  const h = getHistory();
  h.push(entry);
  saveHistory(h);
  state.historyList = h;
  state.reviewData = review;
  clearDraft();
  state.view = 'results';
  render();
  toast('Exam saved to history!', 'success');
}

function buildReviewData() {
  const duration = state.startTime ? Math.round((Date.now() - state.startTime) / 1000) : 0;
  const items = state.quizQuestions.map((q, i) => {
    const ua = state.userAnswers[i] || '';
    const ca = q.answer || '';
    const isCorrect = ua.trim().toLowerCase() === ca.trim().toLowerCase() && ua.trim() !== '';
    return { originalId: q.id, question: q.question, userAnswer: ua, correctAnswer: ca, isCorrect };
  });
  return { items, duration, date: Date.now(), range: state.quizRange };
}

function reviewHistory(idx) {
  const item = state.historyList[idx];
  if (!item) return;
  state.reviewData = { items: item.items, date: item.date, range: item.range, duration: item.duration };
  state.view = 'review';
  render();
}

function clearHistory() {
  if (!confirm('Clear all history? This cannot be undone.')) return;
  saveHistory([]);
  state.historyList = [];
  render();
  toast('History cleared.', 'info');
}

function resumeDraft() {
  const d = getDraft();
  if (!d) return;
  Object.assign(state, d, { view: 'quiz' });
  render();
}

function discardDraft() {
  if (!confirm('Discard saved progress?')) return;
  clearDraft();
  render();
  toast('Draft discarded.', 'info');
}

/* ════════════════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════════════════ */
render();
</script>
</body>
</html>
